# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title:                  Charilaos Kanatsoulis
first_name:             Charilaos
middle_name:            I.
last_name:              Kanatsoulis
email:                  charilaos@cs.stanford.edu
description:            >
  Research Scientist at Stanford SNAP Group. Foundation models for structured data,
  graph neural networks, knowledge graphs, and biomedical AI.

footer_text:            >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with
  <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.

keywords:               graph neural networks, knowledge graphs, foundation models, biomedical AI, relational deep learning, generative AI, machine learning, stanford

lang:                   en
icon:                   👋

url:                    https://kanatsoulis.com
baseurl:                ""
last_updated:           true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light_default:   light
repo_theme_dark_default:    dark

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta:          true
serve_schema_org:       true
og_image:               /assets/img/prof_pic.jpg

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------

rss_icon:               true

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username:        ckanatsoulis
linkedin_username:      ckanatsoulis
scholar_userid:         8EGcDkUAAAAJ
twitter_username:       # add if you have one
mastodon_username:      # add if you have one
orcid_id:               # add if you have one
semanticscholar_id:     # add if you have one

contact_note:           >
  Best way to reach me is by email.

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name:              Notes
blog_description:       Occasional posts on graph ML, foundation models, and research.
permalink:              /blog/:year/:title/

# Pagination
pagination:
  enabled:              true

# Comments (optional - leave blank to disable)
disqus_shortname:       # add disqus shortname if desired
giscus:
  repo:                 # github repo for giscus comments (optional)

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_limit:             10
news_scrollable:        true
news_move_to_the_bottom: false

# -----------------------------------------------------------------------------
# Jekyll Scholar (publications)
# -----------------------------------------------------------------------------

scholar:
  last_name:            [Kanatsoulis]
  first_name:           [Charilaos, C., C. I., Charilaos I.]

  style:                apa
  locale:               en

  source:               /_bibliography
  bibliography:         papers.bib
  bibliography_template: bib

  replace_strings:      true
  join_strings:         true

  details_dir:          bibliography
  details_layout:       bibtex.html
  details_link:         Details

  query:                "@*"

  group_by:             year
  group_order:          descending

  bibtex_filters:       [latex, smallcaps, superscript]

# Display publication preview images (set to true to show thumbnails)
enable_publication_thumbnails:   false
enable_publication_badges:
  altmetric:            false
  dimensions:           false

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown:               kramdown
highlighter:            rouge

include:                ['_pages']
exclude:                [vendor]

plugins:
  - jekyll-feed
  - jekyll-scholar
  - jekyll-sitemap
  - jemoji
